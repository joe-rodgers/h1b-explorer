name: Deploy H1B Explorer

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy-frontend:
    name: Deploy Frontend to SiteGround
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: Install dependencies (if any)
      run: |
        if [ -f "frontend/package.json" ]; then
          cd frontend
          npm install
        fi
        
    - name: Build frontend (if needed)
      run: |
        if [ -f "frontend/package.json" ]; then
          cd frontend
          npm run build
        else
          # For static HTML, just copy the files
          mkdir -p frontend/dist
          cp frontend/index.html frontend/dist/
        fi
        
    - name: Deploy to SiteGround via FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_HOST }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./frontend/dist/
        server-dir: ./public_html/
        exclude: |
          **/.git*
          **/.git*/**
          **/node_modules/**
          **/.DS_Store
          
    - name: Notify deployment success
      run: |
        echo "✅ Frontend deployed successfully to SiteGround"
        echo "🌐 Your app should be available at your domain"

  deploy-backend:
    name: Deploy Backend to Render
    runs-on: ubuntu-latest
    needs: deploy-frontend
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
          
    - name: Install dependencies
      run: |
        cd backend
        pip install -r requirements.txt
        
    - name: Run tests (if any)
      run: |
        cd backend
        python -m pytest tests/ || echo "No tests found, continuing..."
        
    - name: Notify backend deployment
      run: |
        echo "✅ Backend deployment triggered on Render"
        echo "🔗 Backend will be available at your Render URL"
        echo "📝 Make sure to update the BACKEND_URL in frontend/index.html"
        
    - name: Create deployment summary
      run: |
        echo "## 🚀 H1B Explorer Deployment Complete" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### ✅ Frontend (SiteGround)" >> $GITHUB_STEP_SUMMARY
        echo "- Status: Deployed successfully" >> $GITHUB_STEP_SUMMARY
        echo "- Location: public_html directory" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### ✅ Backend (Render)" >> $GITHUB_STEP_SUMMARY
        echo "- Status: Deployment triggered" >> $GITHUB_STEP_SUMMARY
        echo "- Auto-deploy: Enabled" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 🔧 Next Steps:" >> $GITHUB_STEP_SUMMARY
        echo "1. Update BACKEND_URL in frontend/index.html" >> $GITHUB_STEP_SUMMARY
        echo "2. Test the Hello World app" >> $GITHUB_STEP_SUMMARY
        echo "3. Verify all systems are connected" >> $GITHUB_STEP_SUMMARY
