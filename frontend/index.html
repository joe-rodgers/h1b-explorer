<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H1B Explorer - Hello World</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            padding: 40px;
            max-width: 600px;
            width: 90%;
            text-align: center;
        }

        h1 {
            color: #4a5568;
            margin-bottom: 10px;
            font-size: 2.5rem;
            font-weight: 700;
        }

        .subtitle {
            color: #718096;
            margin-bottom: 30px;
            font-size: 1.1rem;
        }

        .status-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .status-card {
            background: #f7fafc;
            border-radius: 12px;
            padding: 20px;
            border: 2px solid #e2e8f0;
            transition: all 0.3s ease;
        }

        .status-card:hover {
            border-color: #667eea;
            transform: translateY(-2px);
        }

        .status-card h3 {
            color: #4a5568;
            margin-bottom: 10px;
            font-size: 1.2rem;
        }

        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
        }

        .status-unknown { background-color: #cbd5e0; }
        .status-success { background-color: #48bb78; }
        .status-error { background-color: #f56565; }

        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary {
            background: #e2e8f0;
            color: #4a5568;
        }

        .btn-secondary:hover {
            background: #cbd5e0;
            transform: translateY(-2px);
        }

        .response-area {
            margin-top: 30px;
            text-align: left;
        }

        .response-area h3 {
            color: #4a5568;
            margin-bottom: 15px;
        }

        .response-box {
            background: #f7fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            max-height: 200px;
            overflow-y: auto;
            white-space: pre-wrap;
        }

        .loading {
            display: none;
            color: #718096;
            font-style: italic;
        }

        @media (max-width: 768px) {
            .status-grid {
                grid-template-columns: 1fr;
            }
            
            .button-group {
                flex-direction: column;
            }
            
            .container {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 H1B Explorer</h1>
        <p class="subtitle">System Integration Test - Hello World</p>
        
        <div class="status-grid">
            <div class="status-card">
                <h3>Backend Status</h3>
                <div id="backend-status">
                    <span class="status-indicator status-unknown"></span>
                    <span>Unknown</span>
                </div>
            </div>
            <div class="status-card">
                <h3>Database Status</h3>
                <div id="db-status">
                    <span class="status-indicator status-unknown"></span>
                    <span>Unknown</span>
                </div>
            </div>
        </div>

        <div class="button-group">
            <button class="btn btn-primary" onclick="testBackend()">
                Test Backend API
            </button>
            <button class="btn btn-secondary" onclick="testDatabase()">
                Test Database Connection
            </button>
            <button class="btn btn-secondary" onclick="testAll()">
                Test All Systems
            </button>
        </div>

        <div class="response-area">
            <h3>Response Log</h3>
            <div id="response-box" class="response-box"></div>
            <div id="loading" class="loading">Testing...</div>
        </div>
    </div>

    <script>
        // Configuration - Backend URL
        const BACKEND_URL = 'https://h1b-explorer-backend.onrender.com';
        
        // Response logging
        function logResponse(message, data = null) {
            const responseBox = document.getElementById('response-box');
            const timestamp = new Date().toLocaleTimeString();
            const logEntry = `[${timestamp}] ${message}\n${data ? JSON.stringify(data, null, 2) + '\n' : ''}`;
            responseBox.textContent += logEntry;
            responseBox.scrollTop = responseBox.scrollHeight;
            console.log(message, data);
        }

        // Update status indicators
        function updateStatus(elementId, status, message) {
            const element = document.getElementById(elementId);
            const indicator = element.querySelector('.status-indicator');
            const text = element.querySelector('span:last-child');
            
            indicator.className = 'status-indicator';
            indicator.classList.add(`status-${status}`);
            text.textContent = message;
        }

        // Show/hide loading
        function setLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
        }

        // Test backend connectivity
        async function testBackend() {
            setLoading(true);
            logResponse('Testing backend connectivity...');
            
            try {
                const response = await fetch(`${BACKEND_URL}/api/test`);
                const data = await response.json();
                
                if (response.ok) {
                    updateStatus('backend-status', 'success', 'Connected');
                    logResponse('✅ Backend test successful:', data);
                } else {
                    updateStatus('backend-status', 'error', 'Failed');
                    logResponse('❌ Backend test failed:', data);
                }
            } catch (error) {
                updateStatus('backend-status', 'error', 'Error');
                logResponse('❌ Backend test error:', { error: error.message });
            } finally {
                setLoading(false);
            }
        }

        // Test database connection
        async function testDatabase() {
            setLoading(true);
            logResponse('Testing database connection...');
            
            try {
                const response = await fetch(`${BACKEND_URL}/api/db-status`);
                const data = await response.json();
                
                if (response.ok && data.db_connected) {
                    updateStatus('db-status', 'success', `Connected (${data.table_count} tables)`);
                    logResponse('✅ Database test successful:', data);
                } else {
                    updateStatus('db-status', 'error', 'Failed');
                    logResponse('❌ Database test failed:', data);
                }
            } catch (error) {
                updateStatus('db-status', 'error', 'Error');
                logResponse('❌ Database test error:', { error: error.message });
            } finally {
                setLoading(false);
            }
        }

        // Test all systems
        async function testAll() {
            logResponse('=== Starting comprehensive system test ===');
            await testBackend();
            await testDatabase();
            logResponse('=== System test complete ===');
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            logResponse('H1B Explorer Hello World app loaded');
            logResponse(`Backend URL configured: ${BACKEND_URL}`);
            logResponse('Click buttons above to test system connectivity');
        });
    </script>
</body>
</html>
